<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">

<head>
  <meta charset="UTF-8">
  <title>新規登録 - Furima</title>
  <link rel="stylesheet" href="/css/application.css">
  <link rel="stylesheet" href="/css/shared/second_header.css">
  <link rel="stylesheet" href="/css/shared/second_footer.css">
  <link rel="stylesheet" href="/css/shared/errors.css">
  <link rel="stylesheet" href="/css/shared/form.css">
  <link rel="stylesheet" href="/css/shared/auth.css">
  <link rel="stylesheet" href="/css/users/sign_up.css">
</head>

<body>

  <div th:replace="~{shared/header :: second-header}"></div>

  <form th:action="@{/users/sign_up}" th:object="${registerForm}" method="post" class="registration-main">
    <div class="form-wrap">
      <div class="form-header">
        <h1 class="form-header-text">会員情報入力</h1>
      </div>

      <div class="error-messages" th:if="${#fields.hasAnyErrors()}">
        <ul style="color: red; list-style: none; padding-left: 0; text-align: center; margin-bottom: 20px;">
          <li th:each="err : ${#sets.toSet(#fields.errors('*'))}" th:text="${err}"></li>
        </ul>
      </div>

      <div class="form-group">
        <div class="form-text-wrap">
          <label class="form-text">ニックネーム</label>
          <span class="indispensable">必須</span>
        </div>
        <textarea th:field="*{nickname}" class="input-default" placeholder="例) furima太郎" maxlength="40"></textarea>
      </div>
      <div class="form-group">
        <div class="form-text-wrap">
          <label class="form-text">メールアドレス</label>
          <span class="indispensable">必須</span>
        </div>
        <input type="email" th:field="*{email}" class="input-default" placeholder="PC・携帯どちらでも可">
      </div>
      <div class="form-group">
        <div class="form-text-wrap">
          <label class="form-text">パスワード</label>
          <span class="indispensable">必須</span>
        </div>
        <input type="password" th:field="*{password}" class="input-default" placeholder="6文字以上の半角英数字">
        <p class="info-text">※英字と数字の両方を含めて設定してください</p>
      </div>
      <div class="form-group">
        <div class="form-text-wrap">
          <label class="form-text">パスワード（確認）</label>
          <span class="indispensable">必須</span>
        </div>
        <input type="password" th:field="*{passwordConfirmation}" class="input-default" placeholder="同じパスワードを入力して下さい">
      </div>

      <div class="form-group">
        <p class="form-info-header">本人確認</p>
        <p class="form-info-text">
          安心・安全にご利用いただくために、お客さまの本人情報の登録にご協力ください。他のお客さまに公開されることはありません。
        </p>
      </div>
      <div class="form-group">
        <div class="form-text-wrap">
          <label class="form-text">お名前（全角）</label>
          <span class="indispensable">必須</span>
        </div>
        <div class="input-name-wrap">
          <input type="text" th:field="*{lastName}" class="input-name" placeholder="例) 山田">
          <input type="text" th:field="*{firstName}" class="input-name" placeholder="例) 陸太郎">
        </div>
      </div>
      <div class="form-group">
        <div class="form-text-wrap">
          <label class="form-text">お名前カナ（全角）</label>
          <span class="indispensable">必須</span>
        </div>
        <div class="input-name-wrap">
          <input type="text" th:field="*{lastNameKana}" class="input-name" placeholder="例) ヤマダ">
          <input type="text" th:field="*{firstNameKana}" class="input-name" placeholder="例) リクタロウ">
        </div>
      </div>
      <div class="form-group">
        <div class="form-text-wrap">
          <label class="form-text">生年月日</label>
          <span class="indispensable">必須</span>
        </div>
        <div class="input-birth-wrap">
          <select th:field="*{birthYear}" class="input-birth-year">
            <option value="">--</option>
            <option th:each="y : ${#numbers.sequence(1950, 2025)}" th:value="${y}" th:text="${y}"></option>
          </select>
          <p>年</p>
          <select th:field="*{birthMonth}" class="input-birth-month">
            <option value="">--</option>
            <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}" th:text="${m}"></option>
          </select>
          <p>月</p>
          <select th:field="*{birthDay}" class="input-birth-day">
            <option value="">--</option>
            <option th:each="d : ${#numbers.sequence(1, 31)}" th:value="${d}" th:text="${d}"></option>
          </select>
          <p>日</p>
        </div>
        <p class="info-text">※ 本人情報は正しく入力してください。会員登録後、修正するにはお時間を頂く場合があります。</p>
      </div>

      <div class="form-group">
        <h2 class="form-bottom-text">
          「会員登録」のボタンを押すことにより、<span>利用規約</span><br>に同意したものとみなします
        </h2>
      </div>
      <div class="register-btn">
        <button type="submit" class="register-red-btn">会員登録</button>
      </div>
      <p class="register-info">本人情報の登録について</p>
    </div>
  </form>

  <div th:replace="~{shared/footer :: auth-footer}"></div>

</body>

</html>
