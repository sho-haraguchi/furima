<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <title>購入手続き - Furima</title>
  <meta name="payjp-public-key" th:content="${payjpPublicKey}">
  
  <link rel="stylesheet" href="/css/application.css">
  <link rel="stylesheet" href="/css/shared/second_header.css">
  <link rel="stylesheet" href="/css/shared/footer.css">
  <link rel="stylesheet" href="/css/shared/errors.css">
  <link rel="stylesheet" href="/css/shared/form.css">
  <link rel="stylesheet" href="/css/transactions/index.css">
  <script src="https://js.pay.jp/v1/"></script>
</head>
<body>

<div th:replace="~{shared/header :: second-header}"></div>

<div class="transaction-contents">
  <div class="transaction-main">
    <h1 class="transaction-title-text">購入内容の確認</h1>

    <!-- 購入内容の表示 -->
    <div class="buy-item-info">
      <img src="/images/item-sample.png" class="buy-item-img" alt="">
      <div class="buy-item-right-content">
        <h2 class="buy-item-text">商品名</h2>
        <div class="buy-item-price">
          <p class="item-price-text">¥999,999,999</p>
          <p class="item-price-sub-text">配送料負担</p>
        </div>
      </div>
    </div>
    <!-- /購入内容の表示 -->

    <!-- 支払額の表示 -->
    <div class="item-payment">
      <h1 class="item-payment-title">支払金額</h1>
      <p class="item-payment-price">¥販売価格</p>
    </div>
    <!-- /支払額の表示 -->

    <!-- formのactionとth:objectを設定しましょう。 -->
    <form id="charge-form" action="hoge" th:object="${hoge}" method="post" class="transaction-form-wrap">
      <!-- エラーメッセージを表示できるようにしましょう。 -->

      <!-- カード情報の入力 -->
      <div class="credit-card-form">
        <h1 class="info-input-haedline">クレジットカード情報入力</h1>
        <div class="form-group">
          <div class="form-text-wrap">
            <label class="form-text">カード情報</label>
            <span class="indispensable">必須</span>
          </div>
          <div id="number-form" class="input-default"></div>
          <div class="available-card">
            <img src="/images/card-visa.gif" class="card-logo" alt="">
            <img src="/images/card-mastercard.gif" class="card-logo" alt="">
            <img src="/images/card-jcb.gif" class="card-logo" alt="">
            <img src="/images/card-amex.gif" class="card-logo" alt="">
          </div>
        </div>
        <div class="form-group">
          <div class="form-text-wrap">
            <label class="form-text">有効期限</label>
            <span class="indispensable">必須</span>
          </div>
          <div class="input-expiration-date-wrap">
            <div id="expiry-form" class="input-default"></div>
          </div>
        </div>
        <div class="form-group">
          <div class="form-text-wrap">
            <label class="form-text">セキュリティコード</label>
            <span class="indispensable">必須</span>
          </div>
          <div id="cvc-form" class="input-default"></div>
        </div>
      </div>
      <!-- /カード情報の入力 -->

      <!-- 配送先の入力 -->
      <div class="shipping-address-form">
        <h1 class="info-input-haedline">配送先入力</h1>
        <div class="form-group">
          <div class="form-text-wrap">
            <label class="form-text">郵便番号</label>
            <span class="indispensable">必須</span>
          </div>
          <input th:field="*{hoge}" type="text" class="input-default" id="postal-code" placeholder="例）123-4567" maxlength="8">
        </div>
        <div class="form-group">
          <div class="form-text-wrap">
            <label class="form-text">都道府県</label>
            <span class="indispensable">必須</span>
          </div>
          <select th:field="*{hoge}" class="select-box">
            <option th:each="hoge : ${hoge}" th:value="${hoge}" th:text="${hoge}"></option>
          </select>
        </div>
        <div class="form-group">
          <div class="form-text-wrap">
            <label class="form-text">市区町村</label>
            <span class="indispensable">必須</span>
          </div>
          <input th:field="*{hoge}" type="text" class="input-default" id="city" placeholder="例）横浜市緑区">
        </div>
        <div class="form-group">
          <div class="form-text-wrap">
            <label class="form-text">番地</label>
            <span class="indispensable">必須</span>
          </div>
          <input th:field="*{hoge}" type="text" class="input-default" id="addresses" placeholder="例）青山1-1-1">
        </div>
        <div class="form-group">
          <div class="form-text-wrap">
            <label class="form-text">建物名</label>
            <span class="form-any">任意</span>
          </div>
          <input th:field="*{hoge}" type="text" class="input-default" id="building" placeholder="例）柳ビル103">
        </div>
        <div class="form-group">
          <div class="form-text-wrap">
            <label class="form-text">電話番号</label>
            <span class="indispensable">必須</span>
          </div>
          <input th:field="*{hoge}" type="text" class="input-default" id="phone-number" placeholder="例）09012345678" maxlength="11">
        </div>
      </div>
      <!-- /配送先の入力 -->

      <div class="buy-btn">
        <button type="submit" class="buy-red-btn" id="button">購入</button>
      </div>
    </form>
  </div>
</div>

<div th:replace="~{shared/footer :: main-footer}"></div>
<script src="/js/create_token.js"></script>
</body>
</html>
