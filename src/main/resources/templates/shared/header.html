<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ja">


<body>
  <header th:fragment="top-header" class="top-page-header">
    <div class="search-bar-contents">
      <a th:href="@{/}">
        <img th:src="@{/images/furima-logo-color.png}" alt="FURIMA" class="furima-icon">
      </a>
      <form class="search-form" action="#">
        <input class="input-box" placeholder="キーワードから探す">
        <button class="search-button">
          <img th:src="@{/images/search.png}" class="search-icon" alt="検索">
        </button>
      </form>
    </div>
    <div class="nav">
      <ul class="lists-left">
        <li><a href="#" class="category-list">カテゴリー</a></li>
        <li><a href="#" class="brand-list">ブランド</a></li>
      </ul>
      
      <ul class="lists-right">
        <th:block sec:authorize="isAuthenticated()">
          <li><a href="#" class="user-nickname" sec:authentication="name">ユーザー名</a></li>
          <li><a th:href="@{/logout}" class="logout">ログアウト</a></li>
        </th:block>

        <th:block sec:authorize="isAnonymous()">
          <li><a th:href="@{/login}" class="login">ログイン</a></li>
          <li><a th:href="@{/users/sign_up}" class="sign-up">新規登録</a></li>
        </th:block>
      </ul>
      
    </div>
  </header>

  <header th:fragment="second-header" class="second-header">
    <a th:href="@{/}"><img th:src="@{/images/furima-logo-color.png}" alt="FURIMA" class="second-logo"></a>
  </header>
</body>

</html>
